# 育英星宠 Nginx 静态资源片段（HTTP / HTTPS 两个 server 块均需加入）
# 路径：/www/server/panel/vhost/nginx/yuyingpets.conf
# 修改后执行：nginx -t && /etc/init.d/nginx reload

    location /assets/pets/ {
        alias /www/wwwroot/yuyingpets/backend/public/assets/pets/;
        try_files $uri =404;
        error_page 404 = @static_not_found;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
    }

    location /assets/pet-decorations/ {
        alias /www/wwwroot/yuyingpets/backend/public/assets/pet-decorations/;
        try_files $uri =404;
        error_page 404 = @static_not_found;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
    }

    location /assets/pets_副本/ {
        alias /www/wwwroot/yuyingpets/backend/public/assets/pets_副本/;
        try_files $uri =404;
        error_page 404 = @static_not_found;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
    }

    # Display-App 工具箱图片，默认由 deploy.sh 发布到 www-admin/display/images/toolbox/
    location /display/images/toolbox/ {
        alias /www/wwwroot/yuyingpets/www-admin/display/images/toolbox/;
        try_files $uri =404;
        error_page 404 = @static_not_found;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
    }

    location /uploads/ {
        alias /www/wwwroot/yuyingpets/backend/public/uploads/;
        try_files $uri =404;
        error_page 404 = @static_not_found;
        access_log off;
        add_header Cache-Control "public, max-age=2592000" always;
    }
