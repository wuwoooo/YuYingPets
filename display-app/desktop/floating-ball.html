<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>育英星宠 Display 悬浮唤醒</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: transparent;
      }

      body {
        display: grid;
        place-items: center;
        user-select: none;
      }

      .ball {
        width: 64px;
        height: 64px;
        border: 0;
        border-radius: 50%;
        padding: 0;
        display: grid;
        place-items: center;
        cursor: pointer;
        background:
          radial-gradient(circle at 30% 22%, rgba(255, 255, 255, 0.95) 0 8px, rgba(255, 255, 255, 0.35) 9px, transparent 18px),
          radial-gradient(circle at 64% 72%, rgba(20, 92, 166, 0.44), transparent 42px),
          linear-gradient(145deg, rgba(255, 255, 255, 0.92), rgba(222, 242, 255, 0.72) 42%, rgba(255, 255, 255, 0.86));
        box-shadow:
          0 16px 30px rgba(8, 31, 62, 0.32),
          0 5px 12px rgba(184, 28, 36, 0.18),
          inset 0 1px 2px rgba(255, 255, 255, 0.95),
          inset 0 -10px 18px rgba(6, 58, 91, 0.12),
          inset 0 0 0 1px rgba(255, 255, 255, 0.68);
        outline: none;
        position: relative;
      }

      .ball:hover {
        transform: translateY(-1px);
      }

      .ball:active {
        transform: translateY(1px) scale(0.98);
      }

      .ball::after {
        content: "";
        position: absolute;
        inset: 5px 9px auto 12px;
        height: 22px;
        border-radius: 50%;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.86), rgba(255, 255, 255, 0));
        pointer-events: none;
      }

      .mark {
        width: 44px;
        height: 44px;
        display: block;
        object-fit: contain;
        filter: drop-shadow(0 2px 3px rgba(6, 58, 91, 0.25));
        position: relative;
        z-index: 1;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
    </style>
  </head>
  <body>
    <button class="ball" id="restoreButton" type="button" title="打开育英星宠 Display">
      <img class="mark" src="./build/floating-ball-logo.png" alt="" />
      <span class="sr-only">打开育英星宠 Display</span>
    </button>
    <script>
      const button = document.getElementById('restoreButton');
      button.addEventListener('click', async () => {
        button.disabled = true;
        try {
          await window.floatingDisplayBall.restoreMainWindow();
        } finally {
          button.disabled = false;
        }
      });
      button.addEventListener('contextmenu', async (event) => {
        event.preventDefault();
        await window.floatingDisplayBall.hideFloatingBall();
      });
    </script>
  </body>
</html>
