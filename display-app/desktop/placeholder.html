<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>育英星宠 Display Desktop</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
      }

      body {
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #0f3d74 0%, #145ca6 48%, #cf1f2e 100%);
        color: #fff;
        font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      body.loading {
        background: radial-gradient(ellipse at 50% 28%, rgba(20, 92, 166, 0.45) 0%, transparent 55%),
          radial-gradient(ellipse at 82% 78%, rgba(207, 31, 46, 0.12) 0%, transparent 45%),
          linear-gradient(160deg, #091e3a 0%, #0f3d74 35%, #145ca6 65%, #0f3d74 100%);
        overflow: hidden;
      }

      body.loading::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image:
          radial-gradient(1.5px 1.5px at 18% 25%, rgba(255, 255, 255, 0.25), transparent),
          radial-gradient(1px 1px at 42% 68%, rgba(255, 255, 255, 0.18), transparent),
          radial-gradient(1.5px 1.5px at 65% 15%, rgba(255, 255, 255, 0.3), transparent),
          radial-gradient(1px 1px at 85% 45%, rgba(255, 255, 255, 0.12), transparent),
          radial-gradient(1px 1px at 8% 78%, rgba(255, 255, 255, 0.2), transparent),
          radial-gradient(1.5px 1.5px at 92% 88%, rgba(255, 255, 255, 0.15), transparent),
          radial-gradient(1px 1px at 55% 92%, rgba(255, 255, 255, 0.22), transparent),
          radial-gradient(1px 1px at 30% 48%, rgba(255, 255, 255, 0.1), transparent);
        animation: drift-stars 25s linear infinite;
        pointer-events: none;
        z-index: 0;
      }

      @keyframes drift-stars {
        0%   { transform: translateY(0) translateX(0); }
        50%  { transform: translateY(-8vh) translateX(3vw); }
        100% { transform: translateY(0) translateX(0); }
      }

      .card {
        max-width: 760px;
        padding: 36px;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.12);
        box-shadow: 0 28px 60px rgba(0, 0, 0, 0.18);
      }

      body.loading .card {
        width: min(480px, calc(100vw - 64px));
        text-align: center;
        background: rgba(255, 255, 255, 0.06);
        box-shadow: 0 32px 72px rgba(0, 0, 0, 0.25);
        border: 1px solid rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(12px);
        position: relative;
        z-index: 1;
        animation: card-enter 0.7s cubic-bezier(0.23, 1, 0.32, 1) both;
      }

      @keyframes card-enter {
        0% {
          opacity: 0;
          transform: translateY(24px) scale(0.96);
        }
        100% {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      .brand {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 18px;
        margin-bottom: 18px;
      }

      body.loading .brand {
        flex-direction: column;
        gap: 0;
        margin-bottom: 8px;
      }

      .brand-mark-wrap {
        width: 86px;
        height: 86px;
        border-radius: 24px;
        display: grid;
        place-items: center;
        background: rgba(255, 255, 255, 0.14);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.32),
          0 14px 28px rgba(8, 31, 62, 0.16);
      }

      body.loading .brand-mark-wrap {
        width: 96px;
        height: 96px;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.1);
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.12),
          0 0 40px rgba(20, 92, 166, 0.4),
          0 0 80px rgba(20, 92, 166, 0.15),
          0 16px 36px rgba(0, 0, 0, 0.2);
        animation: logo-breathe 3s ease-in-out infinite;
        margin-bottom: 20px;
      }

      @keyframes logo-breathe {
        0%, 100% {
          box-shadow:
            0 0 0 1px rgba(255, 255, 255, 0.12),
            0 0 40px rgba(20, 92, 166, 0.4),
            0 0 80px rgba(20, 92, 166, 0.15),
            0 16px 36px rgba(0, 0, 0, 0.2);
          transform: scale(1);
        }
        50% {
          box-shadow:
            0 0 0 1px rgba(255, 255, 255, 0.18),
            0 0 50px rgba(20, 92, 166, 0.55),
            0 0 100px rgba(20, 92, 166, 0.2),
            0 20px 42px rgba(0, 0, 0, 0.25);
          transform: scale(1.03);
        }
      }

      .brand-mark {
        width: 62px;
        height: 62px;
        object-fit: contain;
        display: block;
      }

      body.loading .brand-mark {
        width: 68px;
        height: 68px;
        filter: drop-shadow(0 2px 8px rgba(255, 255, 255, 0.15));
      }

      .brand-text {
        text-align: left;
      }

      body.loading .brand-text {
        text-align: center;
      }

      .brand-kicker {
        margin: 0 0 8px;
        font-size: 13px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.72);
      }

      body.loading .brand-kicker {
        margin: 0 0 6px;
        font-size: 11px;
        letter-spacing: 0.28em;
        color: rgba(255, 255, 255, 0.5);
        animation: text-fade-in 0.8s 0.3s both;
      }

      h1 {
        margin: 0 0 16px;
        font-size: 40px;
      }

      body.loading h1 {
        margin-bottom: 0;
        font-size: 28px;
        font-weight: 700;
        letter-spacing: 0.04em;
        animation: text-fade-in 0.8s 0.15s both;
      }

      @keyframes text-fade-in {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      p {
        line-height: 1.8;
        color: rgba(255, 255, 255, 0.84);
      }

      body.loading #message {
        margin: 0;
        font-size: 15px;
        color: rgba(255, 255, 255, 0.72);
        font-weight: 400;
        animation: text-fade-in 0.8s 0.5s both;
      }

      body.loading #detail {
        margin-top: 14px;
        padding: 0;
        background: transparent;
        color: rgba(255, 255, 255, 0.5);
        font-size: 13px;
        animation: text-fade-in 0.8s 0.65s both;
      }

      pre {
        margin: 18px 0 0;
        padding: 16px;
        border-radius: 16px;
        white-space: pre-wrap;
        word-break: break-word;
        background: rgba(8, 22, 45, 0.38);
        color: rgba(255, 255, 255, 0.92);
      }

      .actions {
        display: flex;
        gap: 12px;
        margin-top: 24px;
        flex-wrap: wrap;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 168px;
        padding: 14px 20px;
        border-radius: 999px;
        color: #fff;
        text-decoration: none;
        background: rgba(255, 255, 255, 0.18);
        border: 1px solid rgba(255, 255, 255, 0.22);
      }

      .loading-indicator {
        width: 72px;
        height: 72px;
        margin: 0 auto 24px;
        position: relative;
        display: none;
      }

      body.loading .loading-indicator {
        display: block;
        animation: indicator-enter 0.6s 0.1s both;
      }

      @keyframes indicator-enter {
        from { opacity: 0; transform: scale(0.8); }
        to   { opacity: 1; transform: scale(1); }
      }

      .loading-indicator::before,
      .loading-indicator::after {
        content: "";
        position: absolute;
        border-radius: 50%;
        box-sizing: border-box;
      }

      .loading-indicator::before {
        inset: 0;
        border: 3px solid rgba(255, 255, 255, 0.08);
        border-top-color: rgba(255, 255, 255, 0.9);
        border-right-color: rgba(255, 255, 255, 0.35);
        animation: spin 1.1s cubic-bezier(0.45, 0.15, 0.55, 0.85) infinite;
      }

      .loading-indicator::after {
        inset: 10px;
        border: 2.5px solid rgba(255, 255, 255, 0.04);
        border-bottom-color: rgba(207, 31, 46, 0.75);
        border-left-color: rgba(207, 31, 46, 0.25);
        animation: spin 1.7s cubic-bezier(0.45, 0.15, 0.55, 0.85) infinite reverse;
      }

      .loading-progress {
        width: min(260px, 55vw);
        height: 3px;
        margin: 20px auto 0;
        border-radius: 3px;
        background: rgba(255, 255, 255, 0.08);
        overflow: hidden;
        display: none;
      }

      body.loading .loading-progress {
        display: block;
        animation: text-fade-in 0.6s 0.7s both;
      }

      .loading-progress::after {
        content: "";
        display: block;
        width: 35%;
        height: 100%;
        border-radius: 3px;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.6), transparent);
        animation: shimmer 1.6s ease-in-out infinite;
      }

      @keyframes shimmer {
        0%   { transform: translateX(-120%); }
        100% { transform: translateX(380%); }
      }

      body.loading .actions,
      body.loading .runtime-tip {
        display: none;
      }

      @keyframes spin {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="brand">
        <div class="brand-mark-wrap">
          <img class="brand-mark" src="./build/floating-ball-logo.png" alt="育英星宠学校标识" />
        </div>
        <div class="brand-text">
          <p class="brand-kicker">YuYingPets Display</p>
          <h1 id="title">育英星宠 Display Desktop</h1>
        </div>
      </div>
      <div class="loading-indicator" aria-hidden="true"></div>
      <p id="message">Electron 桌面壳已建立。下一步将接入 Display Web 构建产物，输出 Windows 安装程序。</p>
      <div class="loading-progress" aria-hidden="true"></div>
      <p class="runtime-tip">可通过环境变量 <code>DISPLAY_START_URL</code> 或同目录 <code>display.config.json</code> 指向线上 Display 页面。</p>
      <pre id="detail" hidden></pre>
      <div class="actions">
        <a id="retry" class="button" href="#" hidden>重试打开线上地址</a>
      </div>
    </div>
    <script>
      const params = new URLSearchParams(window.location.search);
      const variant = params.get('variant');
      const title = params.get('title');
      const message = params.get('message');
      const detail = params.get('detail');
      const retryUrl = params.get('retryUrl');

      if (variant === 'loading') {
        document.body.classList.add('loading');
      }

      if (title) {
        document.getElementById('title').textContent = title;
      }
      if (message) {
        document.getElementById('message').textContent = message;
      }
      if (detail) {
        const detailNode = document.getElementById('detail');
        detailNode.hidden = false;
        detailNode.textContent = detail;
      }
      if (retryUrl) {
        const retryNode = document.getElementById('retry');
        retryNode.hidden = false;
        retryNode.href = retryUrl;
      }
    </script>
  </body>
</html>
